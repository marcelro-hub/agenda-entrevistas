const DURATION_MIN = 60;

// ⚠️ IMPORTANTE: Después de hacer deploy en Railway, reemplazá este valor
// con la URL real de tu servicio, ej: "https://agenda-entrevistas-api.railway.app/api"
const API_BASE = "https://exquisite-adventure-production-7366.up.railway.app/api";


function formatDate(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("es-AR", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
  });
}

function formatDateShort(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("es-AR", {
    weekday: "short", day: "numeric", month: "short",
  });
}

function formatDateMedium(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("es-ES", {
    weekday: "long", day: "numeric", month: "long",
  });
}

function generateICS(iv, date, time, guestName, guestEmail) {
  const [y, mo, d] = date.split("-");
  const [h, min] = time.split(":");
  const pad = (n) => String(n).padStart(2, "0");
  const startH = parseInt(h), startMin = parseInt(min);
  const endTotalMin = startH * 60 + startMin + DURATION_MIN;
  const endH = Math.floor(endTotalMin / 60), endMin = endTotalMin % 60;
  const dtStart = `${y}${mo}${d}T${pad(startH)}${pad(startMin)}00`;
  const dtEnd = `${y}${mo}${d}T${pad(endH)}${pad(endMin)}00`;
  const uid = `${date}-${time.replace(":", "")}-${iv.id}@entrevistas`;
  return [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Agenda Entrevistas//ES",
    "CALSCALE:GREGORIAN","METHOD:REQUEST","BEGIN:VEVENT",
    `UID:${uid}`,`DTSTART:${dtStart}`,`DTEND:${dtEnd}`,
    `SUMMARY:Entrevista — ${iv.name}`,
    `DESCRIPTION:Entrevista con ${iv.name}\\nCandidato/a: ${guestName}\\nPlataforma: Microsoft Teams\\n\\nEnlace Teams: ${iv.teamsLink}`,
    `LOCATION:Microsoft Teams`,`URL:${iv.teamsLink}`,
    `ORGANIZER;CN=${iv.name}:mailto:${iv.email}`,
    `ATTENDEE;CN=${guestName};RSVP=TRUE:mailto:${guestEmail}`,
    "STATUS:CONFIRMED","SEQUENCE:0",
    "BEGIN:VALARM","TRIGGER:-PT10M","ACTION:DISPLAY",
    "DESCRIPTION:Tu entrevista comienza en 10 minutos","END:VALARM",
    "END:VEVENT","END:VCALENDAR",
  ].join("\r\n");
}


function InterviewScheduler() {
  const [view, setView] = useState("home");
  const [selectedIv, setSelectedIv] = useState(null);
  const [slot, setSlot] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name: "", email: "" });
  const [bookings, setBookings] = useState({});
  const [interviewers, setInterviewers] = useState({});      // Antes era INTERVIEWERS (hardcodeado)
  const [interviewersReady, setInterviewersReady] = useState(false);
  const [loading, setLoading] = useState(false);
  const [storageReady, setStorageReady] = useState(false);
  const [confirmedBooking, setConfirmedBooking] = useState(null);
  const [showAdmin, setShowAdmin] = useState(false);
  const remindersSet = useRef(new Set());

  // ─── FOCUS GROUPS STATE ──────────────────────────────────────────────────
  const [focusGroups, setFocusGroups] = useState([]);
  const [focusGroupsReady, setFocusGroupsReady] = useState(false);
  const [selectedFG, setSelectedFG] = useState(null);       // grupo seleccionado para modal
  const [selectedFGSlot, setSelectedFGSlot] = useState(null); // slot number
  const [showFGModal, setShowFGModal] = useState(false);
  const [fgForm, setFgForm] = useState({ name: "", email: "" });
  const [fgLoading, setFgLoading] = useState(false);
  const [confirmedFG, setConfirmedFG] = useState(null);      // inscripción confirmada

  // Carga los entrevistadores y sus slots desde la API (se ejecuta una sola vez)
  useEffect(() => {
    fetch(`${API_BASE}/interviewers`)
      .then(r => { if (!r.ok) throw new Error("Error cargando entrevistadores"); return r.json(); })
      .then(data => setInterviewers(data))
      .catch(err => console.error("Error cargando entrevistadores:", err))
      .finally(() => setInterviewersReady(true));
  }, []);

  // Carga las reservas desde la API — se refresca cada 12 segundos
  const loadBookings = useCallback(async () => {
    try {
      const res = await fetch(`${API_BASE}/bookings`);
      if (!res.ok) throw new Error("Error en red");
      const data = await res.json();
      
      const objBookings = {};
      if (data && Array.isArray(data)) {
        data.forEach(fila => {
          if (fila && fila.key) {
            objBookings[fila.key] = { 
              name: fila.name || "Sin nombre", 
              email: fila.email || "", 
              at: fila.at || "" 
            };
          }
        });
      }
      setBookings(objBookings);
    } catch (error) {
      console.error("Error cargando reservas:", error);
      setBookings({});
    } finally {
      setStorageReady(true);
    }
  }, []);
  
  useEffect(() => {
    loadBookings();
    if (typeof Notification !== "undefined") Notification.requestPermission();
    const iv = setInterval(loadBookings, 12000);
    return () => clearInterval(iv);
  }, [loadBookings]);

  // ─── FOCUS GROUPS: Carga y refresco ────────────────────────────────────
  const loadFocusGroups = useCallback(async () => {
    try {
      const res = await fetch(`${API_BASE}/focus-groups`);
      if (!res.ok) throw new Error("Error cargando grupos focales");
      const data = await res.json();
      setFocusGroups(data || []);
    } catch (err) {
      console.error("Error cargando grupos focales:", err);
      setFocusGroups([]);
    } finally {
      setFocusGroupsReady(true);
    }
  }, []);

  useEffect(() => {
    loadFocusGroups();
    const iv = setInterval(loadFocusGroups, 12000);
    return () => clearInterval(iv);
  }, [loadFocusGroups]);

  useEffect(() => {
    Object.entries(bookings).forEach(([key]) => {
      if (remindersSet.current.has(key)) return;
      const [ivId, date, time] = key.split("|");
      const [y, mo, d] = date.split("-").map(Number);
      const [h, min] = time.split(":").map(Number);
      const delay = new Date(y, mo - 1, d, h, min).getTime() - 10 * 60 * 1000 - Date.now();
      if (delay > 0 && delay < 24 * 3600 * 1000) {
        remindersSet.current.add(key);
        setTimeout(() => {
          if (Notification.permission === "granted")
            new Notification("⏰ Entrevista en 10 minutos", { body: `Con ${interviewers[ivId]?.name} a las ${time}hs` });
        }, delay);
      }
    });
  }, [bookings]);

const handleBook = async () => {
    if (!form.name.trim() || !form.email.trim() || !slot || !selectedIv) return;
    const key = `${selectedIv}|${slot.date}|${slot.time}`;
    if (bookings[key]) { alert("Este horario acaba de ser tomado. Elegí otro."); setShowModal(false); return; }
    
    setLoading(true);
    try {
      const nb = { name: form.name.trim(), email: form.email.trim(), at: new Date().toISOString() };
      
      const res = await fetch(`${API_BASE}/bookings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: key, ...nb }),
      });

      if (res.ok) {
        const newBooking = {
          iv: selectedIv,               // Guardamos el ID del entrevistador
          date: slot.date,
          time: slot.time,
          name: form.name,
          email: form.email
        };
        setConfirmedBooking(newBooking);
        setView("success");
        setShowModal(false);
        setForm({ name: "", email: "" });
        loadBookings();
      } else {
        const errData = await res.json().catch(() => ({}));
        if (res.status === 409) {
          alert("Este horario acaba de ser tomado. Elegí otro.");
          setShowModal(false);
          loadBookings();
        } else {
          alert(errData.error || "Error al guardar en la base de datos. Intente de nuevo.");
        }
      }

    } catch (err) {
      console.error("Error en el registro:", err);
      alert("Hubo un problema de conexión.");
    } finally {
      setLoading(false);
    }
  };

  // ─── FOCUS GROUPS: Inscripción ────────────────────────────────────────
  const handleFGRegister = async () => {
    if (!fgForm.name.trim() || !fgForm.email.trim() || !selectedFG || !selectedFGSlot) return;

    setFgLoading(true);
    try {
      const res = await fetch(`${API_BASE}/focus-groups/${selectedFG.id}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          slot_number: selectedFGSlot,
          name: fgForm.name.trim(),
          email: fgForm.email.trim(),
        }),
      });

      if (res.ok) {
        setConfirmedFG({
          group: selectedFG,
          slotNumber: selectedFGSlot,
          name: fgForm.name.trim(),
          email: fgForm.email.trim(),
        });
        setView("focus-success");
        setShowFGModal(false);
        setFgForm({ name: "", email: "" });
        loadFocusGroups();
      } else {
        const errData = await res.json().catch(() => ({}));
        if (res.status === 409) {
          alert("Este espacio acaba de ser tomado. Elegí otro.");
          setShowFGModal(false);
          loadFocusGroups();
        } else {
          alert(errData.error || "Error al registrar. Intente de nuevo.");
        }
      }
    } catch (err) {
      console.error("Error en inscripción de grupo focal:", err);
      alert("Hubo un problema de conexión.");
    } finally {
      setFgLoading(false);
    }
  };

  const downloadICS = () => {
    if (!confirmedBooking) return;
    const { iv: ivId, date, time, name, email } = confirmedBooking;
    // Resolvemos el ID del entrevistador al objeto completo (necesario para generateICS)
    const ivObj = interviewers[ivId];
    if (!ivObj) return;
    const blob = new Blob([generateICS(ivObj, date, time, name, email)], { type: "text/calendar;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `entrevista_${date}_${time.replace(":", "")}.ics`; a.click();
  };

  const iv = selectedIv ? interviewers[selectedIv] : null;

  // ─── Helpers para focus groups ─────────────────────────────────────────
  const totalFGSlots = focusGroups.reduce((sum, g) => sum + g.max_slots, 0);
  const totalFGOccupied = focusGroups.reduce((sum, g) => sum + g.occupied_slots.length, 0);
  const totalFGAvailable = totalFGSlots - totalFGOccupied;

      padding:0.3rem 0.8rem;border-radius:20px;font-size:0.75rem;font-weight:600;
      background:rgba(255,255,255,0.18);color:#fff;backdrop-filter:blur(4px);

      display:inline-block;margin-top:1.2rem;padding:0.65rem 1.5rem;border-radius:8px;

      font-family:'DM Sans',sans-serif;border:none;cursor:pointer;transition:all 0.15s;position:relative;

    .fg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;margin-top:1.5rem}
    .fg-card{
      background:#fff;border-radius:14px;padding:1.5rem;border:1px solid #E8E3DC;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform 0.2s,box-shadow 0.2s;
    }
    .fg-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.09)}
    .fg-card-hdr{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.9rem}
    .fg-card-icon{
      width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;
    }
    .fg-card-title{font-family:'Libre Baskerville',serif;font-size:1.05rem;color:#1A1A1A}
    .fg-card-date{font-size:0.75rem;color:#6B6B6B;font-weight:300;text-transform:capitalize}
    .fg-card-time{
      display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:#4B4B4B;
      background:#F7F4EF;border-radius:6px;padding:0.45rem 0.75rem;margin-bottom:1rem;
    }
    .fg-card-avail{font-size:0.75rem;color:#6B6B6B;margin-bottom:0.65rem;font-weight:500}
    .fg-slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem}
    .fg-slot{
      padding:0.55rem 0.4rem;border-radius:8px;border:none;font-size:0.8rem;font-weight:600;
      cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;text-align:center;
    }
    .fg-slot-available{
      background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;
    }
    .fg-slot-available:hover{opacity:0.85;transform:scale(1.05)}
    .fg-slot-taken{
      background:#F3F4F6;color:#C4C4C4;cursor:not-allowed;
    }

    /* Admin focus groups summary */
    .fg-adm-section{margin-top:2rem}
    .fg-adm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;margin-top:1rem}
    .fg-adm-card{
      background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #E8E3DC;
      display:flex;flex-direction:column;gap:0.6rem;
    }
    .fg-adm-card-hdr{display:flex;align-items:center;justify-content:space-between}
    .fg-adm-card-title{font-family:'Libre Baskerville',serif;font-size:1rem;color:#1A1A1A}
    .fg-adm-badge{
      padding:0.2rem 0.6rem;border-radius:20px;font-size:0.68rem;font-weight:600;
    }
    .fg-adm-badge-full{background:#ECFDF5;color:#047857}
    .fg-adm-badge-partial{background:#FFF7ED;color:#9A3412}
    .fg-adm-badge-empty{background:#F3F4F6;color:#6B7280}
    .fg-adm-info{font-size:0.78rem;color:#6B6B6B;line-height:1.5}
    .fg-adm-bar-bg{height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;margin-top:0.3rem}
    .fg-adm-bar{height:100%;border-radius:3px;transition:width 0.4s ease}

    @media(max-width:580px){.cards{grid-template-columns:1fr}.cal-row{grid-template-columns:90px 1fr}.adm-row{grid-template-columns:1fr 1fr}.fg-grid{grid-template-columns:1fr}.fg-adm-grid{grid-template-columns:1fr}}
  `;

  if (!storageReady || !interviewersReady) return (
    <>
      <style>{css}</style>
      <div className="app" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#6B6B6B", fontSize: "0.875rem" }}>
        Cargando calendario...
      </div>
    </>
  );

  // Stat helpers
  function ivStats(k) {
    const ivr = interviewers[k]; let total = 0, booked = 0;
    Object.entries(ivr.slots).forEach(([dt, ts]) => { total += ts.length; ts.forEach(t => { if (bookings[`${k}|${dt}|${t}`]) booked++; }); });
    return { total, booked, available: total - booked };
  }
  function dateRange(slots) {
    const d = Object.keys(slots).sort(); return `${formatDateShort(d[0])} — ${formatDateShort(d[d.length-1])}`;
  }

  // Focus group color palette
  const fgColors = [
    { bg: "linear-gradient(135deg,#6366F1,#818CF8)", accent: "#6366F1" },
    { bg: "linear-gradient(135deg,#8B5CF6,#A78BFA)", accent: "#8B5CF6" },
    { bg: "linear-gradient(135deg,#EC4899,#F472B6)", accent: "#EC4899" },
    { bg: "linear-gradient(135deg,#F59E0B,#FBBF24)", accent: "#F59E0B" },
    { bg: "linear-gradient(135deg,#10B981,#34D399)", accent: "#10B981" },
    { bg: "linear-gradient(135deg,#3B82F6,#60A5FA)", accent: "#3B82F6" },
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <header className="hdr">
          <div>
            <h1>Agenda de Entrevistas Internas - Estrategia Institucional 2027-2031</h1>
            <div className="hdr-sub">Reserve su horario · Teams · Bolivia UTC-4</div>
          </div>
          <div className="hdr-btns">
            {view !== "home" && !showAdmin && (
              <button className="btn-g" onClick={() => { setView("home"); setSelectedIv(null); }}>← Inicio</button>
            )}
            <button className="btn-g" onClick={() => { setShowAdmin(!showAdmin); if (!showAdmin) { setView("home"); setSelectedIv(null); } }}>
              {showAdmin ? "📅 Calendario" : "📋 Reservas"}
            </button>
          </div>
        </header>

        <main className="main">
          {/* ADMIN */}
          {showAdmin && (() => {
            const rows = Object.entries(bookings).map(([k, d]) => { const [id, date, time] = k.split("|"); return { id, date, time, ...d }; }).sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
            return (
              <div>
                <h2 className="sec-title">Reservas registradas</h2>
                <p className="sec-sub">{rows.length} de ~23 entrevistas agendadas</p>
                {rows.length === 0
                  ? <div style={{ background: "#fff", borderRadius: "12px", padding: "2.5rem", textAlign: "center", color: "#9A9A9A", border: "1px solid #E8E3DC" }}>Aún no hay reservas</div>
                  : <div className="adm-tbl">
                    <div className="adm-row adm-hdr"><span>Entrevistado/a</span><span>Email</span><span>Fecha</span><span>Hora</span></div>
                    {rows.map((r, i) => {
                      const ivr = interviewers[r.id];
                      return (
                        <div key={i} className="adm-row">
                          <div><div style={{ fontWeight: 500 }}>{r.name}</div><span className={`badge ${r.id === "noelia" ? "b-nm" : "b-jl"}`}>{ivr?.name}</span></div>
                          <div style={{ color: "#6B6B6B", fontSize: "0.77rem", wordBreak: "break-all" }}>{r.email}</div>
                          <div style={{ fontSize: "0.78rem", textTransform: "capitalize" }}>{formatDateShort(r.date)}</div>
                          <div style={{ fontWeight: 600, color: ivr?.accentColor }}>{r.time} hs</div>
                        </div>
                      );
                    })}
                  </div>
                }

                {/* ─── ADMIN: RESUMEN GRUPOS FOCALES ────────────────────── */}

                  <h2 className="sec-title" style={{ marginTop: "1rem" }}>Grupos Focales — Resumen</h2>
                  <p className="sec-sub">
                    {focusGroups.length} grupos · {totalFGOccupied} inscritos de {totalFGSlots} · {totalFGAvailable} espacios disponibles
                  </p>
                  <div className="fg-adm-grid">
                    {focusGroups.map((g, idx) => {
                      const occupied = g.occupied_slots.length;
                      const available = g.max_slots - occupied;
                      const pct = Math.round((occupied / g.max_slots) * 100);
                      const color = fgColors[idx % fgColors.length];
                      let badgeClass = "fg-adm-badge-empty";
                      let badgeText = "Vacío";
                      if (occupied === g.max_slots) { badgeClass = "fg-adm-badge-full"; badgeText = "Completo"; }
                      else if (occupied > 0) { badgeClass = "fg-adm-badge-partial"; badgeText = `${occupied}/${g.max_slots}`; }

                      return (
                        <div key={g.id} className="fg-adm-card">
                          <div className="fg-adm-card-hdr">
                            <div className="fg-adm-card-title">{g.name}</div>
                            <span className={`fg-adm-badge ${badgeClass}`}>{badgeText}</span>
                          </div>
                          <div className="fg-adm-info">
                            📅 {formatDateMedium(g.group_date)}<br/>
                            🕐 {g.start_time} – {g.end_time} hs<br/>
                            👥 {occupied} integrante{occupied !== 1 ? "s" : ""} · {available} espacio{available !== 1 ? "s" : ""} disponible{available !== 1 ? "s" : ""}
                          </div>
                          <div className="fg-adm-bar-bg">
                            <div className="fg-adm-bar" style={{ width: `${pct}%`, background: color.accent }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* HOME */}
          {!showAdmin && view === "home" && (
            <div>
              <h2 className="sec-title">Selecciona un entrevistador</h2>
              <p className="sec-sub">Elija un entrevistador según su disponibilidad horaria.</p>
              <div className="cards">
                {Object.entries(interviewers).map(([k, ivr]) => {
                  const { total, booked, available } = ivStats(k);
                  return (
                    <div key={k} className="card" onClick={() => { setSelectedIv(k); setView("calendar"); }}>
                      <div className="card-hdr" style={{ background: ivr.bgGradient }}>
                        <div className="ini">{ivr.initials}</div>
                        <div><div className="card-name">{ivr.name}</div><div className="card-dur">{DURATION_MIN} min · Microsoft Teams</div></div>
                      </div>
                      <div className="card-body">
                        <div className="pills">
                          <span className={`pill ${available > 0 ? "pill-a" : "pill-t"}`}>{available} disponible{available !== 1 ? "s" : ""}</span>
                          {booked > 0 && <span className="pill pill-t">{booked} reservado{booked !== 1 ? "s" : ""}</span>}
                          <span className="pill pill-p">{dateRange(ivr.slots)}</span>
                        </div>
                        <button className="card-cta" style={{ background: ivr.accentColor }}>Ver horarios →</button>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* ─── BANNER GRUPOS FOCALES ──────────────────────────────── */}
              <div className="fg-banner" onClick={() => setView("focus-groups")}>
                <div className="fg-banner-icon">👥</div>
                <div className="fg-banner-title">Grupos Focales</div>
                <div className="fg-banner-desc">
                  Participe en una sesión de grupo focal para la Estrategia Institucional 2027-2031.
                  Seleccione el grupo y horario que mejor se ajuste a su disponibilidad.
                </div>
                <div className="fg-banner-pills">
                  <span className="fg-banner-pill">6 grupos disponibles</span>
                  <span className="fg-banner-pill">9 espacios por grupo</span>
                  <span className="fg-banner-pill">{totalFGAvailable} espacio{totalFGAvailable !== 1 ? "s" : ""} libre{totalFGAvailable !== 1 ? "s" : ""}</span>
                </div>
                <button className="fg-banner-cta">Inscribirse →</button>
              </div>

              <p style={{ marginTop: "1.75rem", fontSize: "0.75rem", color: "#9A9A9A", textAlign: "center" }}>
                 Los horarios disponibles son únicos.
              </p>
            </div>
          )}

          {/* ─── FOCUS GROUPS VIEW ─────────────────────────────────────── */}
          {!showAdmin && view === "focus-groups" && (
            <div>
              <div style={{ marginBottom: "1.5rem" }}>
                <h2 className="sec-title">Grupos Focales</h2>
                <p className="sec-sub">
                  Seleccione un espacio disponible en el grupo de su preferencia. Cada grupo tiene un máximo de 9 participantes.
                </p>
                <div className="legend">
                  <span><span className="ldot" style={{ background: "#6366F1" }} />Disponible</span>
                  <span><span className="ldot" style={{ background: "#D1D5DB" }} />Ocupado</span>
                </div>
              </div>
              <div className="fg-grid">
                {focusGroups.map((g, idx) => {
                  const color = fgColors[idx % fgColors.length];
                  const available = g.max_slots - g.occupied_slots.length;
                  const allTaken = available === 0;
                  return (
                    <div key={g.id} className="fg-card" style={allTaken ? { opacity: 0.55 } : {}}>
                      <div className="fg-card-hdr">
                        <div className="fg-card-icon" style={{ background: color.bg }}>
                          {idx + 1}
                        </div>
                        <div>
                          <div className="fg-card-title">{g.name}</div>
                          <div className="fg-card-date">{formatDateMedium(g.group_date)}</div>
                        </div>
                      </div>
                      <div className="fg-card-time">
                        🕐 {g.start_time} – {g.end_time} hs (Bolivia)
                      </div>
                      <div className="fg-card-avail">
                        {allTaken
                          ? "❌ Grupo completo"
                          : `✅ ${available} espacio${available !== 1 ? "s" : ""} disponible${available !== 1 ? "s" : ""}`
                        }
                      </div>
                      <div className="fg-slots-grid">
                        {Array.from({ length: g.max_slots }, (_, i) => i + 1).map(slotNum => {
                          const taken = g.occupied_slots.includes(slotNum);
                          return (
                            <button
                              key={slotNum}
                              className={`fg-slot ${taken ? "fg-slot-taken" : "fg-slot-available"}`}
                              disabled={taken}
                              onClick={() => {
                                if (!taken) {
                                  setSelectedFG(g);
                                  setSelectedFGSlot(slotNum);
                                  setShowFGModal(true);
                                }
                              }}
                            >
                              {taken ? `— —` : `Espacio ${slotNum}`}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* CALENDAR */}
          {!showAdmin && view === "calendar" && iv && (
            <div>
              <div className="cal-hdr">
                <div className="cal-ini" style={{ background: iv.bgGradient }}>{iv.initials}</div>
                <div>
                  <h2 style={{ fontFamily: "'Libre Baskerville',serif", fontSize: "1.25rem", color: "#1A1A1A" }}>{iv.name}</h2>
                  <p style={{ fontSize: "0.8rem", color: "#6B6B6B", fontWeight: 300 }}>Duración: {DURATION_MIN} min · Microsoft Teams · UTC-4</p>
                </div>
              </div>
              <div className="legend">
                <span><span className="ldot" style={{ background: iv.accentColor }} />Disponible</span>
                <span><span className="ldot" style={{ background: "#D1D5DB" }} />Ocupado</span>
              </div>
              <div className="cal-grid">
                <div className="cal-row" style={{ background: "#1A1A1A" }}>
                  <div className="cal-date" style={{ borderRightColor: "#333" }}>
                    <span style={{ fontSize: "0.66rem", color: "rgba(247,244,239,0.4)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Fecha</span>
                  </div>
                  <div style={{ padding: "0.9rem 1rem", display: "flex", alignItems: "center" }}>
                    <span style={{ fontSize: "0.66rem", color: "rgba(247,244,239,0.4)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Horarios disponibles</span>
                  </div>
                </div>
               {Object.keys(iv.slots).sort().map(date => {
                  const [y, mo, d] = date.split("-").map(Number);
                  const obj = new Date(y, mo - 1, d);
                  
                  // --- INICIO FILTRO DE FECHAS PASADAS ---
                  const today = new Date();
                  today.setHours(0, 0, 0, 0); // Reseteamos la hora para comparar solo el día exacto
                  if (obj < today) return null; // Si la fecha es de ayer para atrás, no la dibuja
                  // --- FIN FILTRO DE FECHAS PASADAS ---

                  const times = iv.slots[date];
                  const allTaken = times.every(t => bookings[`${selectedIv}|${date}|${t}`]);
                  return (
                    <div key={date} className="cal-row" style={allTaken ? { opacity: 0.55 } : {}}>
                      <div className="cal-date">
                        <span className="dwd">{obj.toLocaleDateString("es-AR", { weekday: "short" })}</span>
                        <span className="dnum">{obj.getDate()}</span>
                        <span className="dmo">{obj.toLocaleDateString("es-AR", { month: "short" })}</span>
                      </div>
                      <div className="slots">
                        {times.map(t => {
                          const taken = !!bookings[`${selectedIv}|${date}|${t}`];
                          return (
                            <button key={t} className={`slot ${taken ? "slot-t" : "slot-a"}`}
                              style={taken ? {} : { background: iv.accentColor }} disabled={taken}
                              onClick={() => { setSlot({ date, time: t }); setShowModal(true); }}>
                              {t} hs {taken ? "✓" : ""}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* --- PANTALLA DE ÉXITO (ENTREVISTAS) --- */}
          {!showAdmin && view === "success" && (
            <div className="scard" style={{ textAlign: "center" }}>
              <div className="s-icon">✅</div>
              <div className="s-title">Reserva Confirmada</div>
              <p style={{ color: "#6B6B6B", fontSize: "0.9rem", marginBottom: "1.5rem" }}>
                En el transcurso del día se les enviará el enlace para la reunión vía Teams
              </p>
              
              {confirmedBooking && (
                <div style={{ textAlign: "left", marginBottom: "1.5rem" }}>
                  <div className="drow">
                    <span className="dlbl">Candidato/a:</span>
                    <span className="dval">{confirmedBooking.name}</span>
                  </div>
                  <div className="drow">
                    <span className="dlbl">Entrevistador:</span>
                    <span className="dval" style={{ textTransform: "capitalize" }}>
                      {interviewers[confirmedBooking.iv]?.name || confirmedBooking.iv}
                    </span>
                  </div>
                  <div className="drow">
                    <span className="dlbl">Fecha:</span>
                    <span className="dval" style={{ textTransform: "capitalize" }}>
                      {formatDateShort(confirmedBooking.date)}
                    </span>
                  </div>
                  <div className="drow">
                    <span className="dlbl">Hora:</span>
                    <span className="dval">{confirmedBooking.time} hs</span>
                  </div>
                </div>
              )}

              <button className="btn-p" onClick={downloadICS} style={{ marginBottom: "0.65rem" }}>
                Descargar evento (.ics)
              </button>
              
              <button className="btn-s" onClick={() => { 
                setView("home"); 
                setConfirmedBooking(null); 
                setSelectedIv(null); 
              }}>
                Volver al inicio
              </button>
            </div>
          )}

          {/* --- PANTALLA DE ÉXITO (GRUPOS FOCALES) --- */}
          {!showAdmin && view === "focus-success" && confirmedFG && (
            <div className="scard" style={{ textAlign: "center" }}>
              <div className="s-icon">✅</div>
              <div className="s-title">Inscripción Confirmada</div>
              <p style={{ color: "#6B6B6B", fontSize: "0.9rem", marginBottom: "1.5rem" }}>
                Se ha registrado exitosamente en el grupo focal. Recibirá instrucciones adicionales por correo electrónico.
              </p>

              <div style={{ textAlign: "left", marginBottom: "1.5rem" }}>
                <div className="drow">
                  <span className="dlbl">Participante:</span>
                  <span className="dval">{confirmedFG.name}</span>
                </div>
                <div className="drow">
                  <span className="dlbl">Grupo:</span>
                  <span className="dval">{confirmedFG.group.name}</span>
                </div>
                <div className="drow">
                  <span className="dlbl">Fecha:</span>
                  <span className="dval" style={{ textTransform: "capitalize" }}>
                    {formatDateMedium(confirmedFG.group.group_date)}
                  </span>
                </div>
                <div className="drow">
                  <span className="dlbl">Horario:</span>
                  <span className="dval">{confirmedFG.group.start_time} – {confirmedFG.group.end_time} hs</span>
                </div>
              </div>

              <button className="btn-s" onClick={() => {
                setView("home");
                setConfirmedFG(null);
              }}>
                Volver al inicio
              </button>
            </div>
          )}
          
        </main>
        
       {/* --- INICIO DEL FOOTER ULTRA COMPACTO --- */}
          <footer className="footer">
            <div className="footer-content">
              <div className="footer-title">Contacto</div>
              <p style={{ fontSize: "0.6rem", marginBottom: "0.1rem", color: "rgba(247,244,239,0.6)" }}>
                ¿Tiene alguna duda sobre esta página?
              </p>
              <a href="mailto:mrojas@fonplata.org" className="footer-email">
                mrojas@fonplata.org
              </a>
              <div className="footer-copyright">
                © 2026 FONPLATA · Estrategia Institucional 2027 - 2031.
                <br />Todos los derechos reservados.
              </div>
            </div>
          </footer>
          {/* --- FIN DEL FOOTER ULTRA COMPACTO --- */}
       
        
      </div>

        
      {/* MODAL ENTREVISTAS */}
      {showModal && slot && iv && (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && !loading && setShowModal(false)}>
          <div className="modal">
            <h2 className="m-title">Confirmar horario</h2>
            <p style={{ fontSize: "0.82rem", color: "#6B6B6B", marginTop: "0.2rem" }}>Completá tus datos para reservar este turno</p>
            <div className="m-info" style={{ borderLeftColor: iv.accentColor }}>
              <strong style={{ color: iv.accentColor }}>{iv.name}</strong><br />
              <span style={{ color: "#4B4B4B", fontSize: "0.82rem" }}>📆 {formatDate(slot.date)} &nbsp; ⏰ {slot.time} hs</span>
            </div>
            <div style={{ marginBottom: "0.9rem" }}>
              <label className="flabel">Nombre completo</label>
              <input className="finput" type="text" placeholder="Tu nombre y apellido" value={form.name}
                onChange={e => setForm({ ...form, name: e.target.value })} />
            </div>
            <div>
              <label className="flabel">Correo electrónico</label>
              <input className="finput" type="email" placeholder="tu@correo.com" value={form.email}
                onChange={e => setForm({ ...form, email: e.target.value })} />
              <p className="fhint">Usaremos este correo para identificar tu reserva</p>
            </div>
            <div className="m-acts">
              <button className="btn-x" onClick={() => setShowModal(false)} disabled={loading}>Cancelar</button>
              <button className="btn-ok" disabled={loading || !form.name.trim() || !form.email.trim()}
                style={{ background: (!form.name.trim() || !form.email.trim() || loading) ? "#D1D5DB" : iv.accentColor }}
                onClick={handleBook}>
                {loading ? "Reservando..." : "Confirmar"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL GRUPOS FOCALES */}
      {showFGModal && selectedFG && selectedFGSlot && (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && !fgLoading && setShowFGModal(false)}>
          <div className="modal">
            <h2 className="m-title">Inscripción a Grupo Focal</h2>
            <p style={{ fontSize: "0.82rem", color: "#6B6B6B", marginTop: "0.2rem" }}>Completá tus datos para inscribirte</p>
            <div className="m-info" style={{ borderLeftColor: "#6366F1" }}>
              <strong style={{ color: "#6366F1" }}>{selectedFG.name}</strong><br />
              <span style={{ color: "#4B4B4B", fontSize: "0.82rem" }}>
                📆 {formatDateMedium(selectedFG.group_date)} &nbsp; 🕐 {selectedFG.start_time} – {selectedFG.end_time} hs
              </span>
            </div>
            <div style={{ marginBottom: "0.9rem" }}>
              <label className="flabel">Nombre completo</label>
              <input className="finput" type="text" placeholder="Tu nombre y apellido" value={fgForm.name}
                onChange={e => setFgForm({ ...fgForm, name: e.target.value })} />
            </div>
            <div>
              <label className="flabel">Correo electrónico</label>
              <input className="finput" type="email" placeholder="tu@correo.com" value={fgForm.email}
                onChange={e => setFgForm({ ...fgForm, email: e.target.value })} />
              <p className="fhint">Usaremos este correo para contactarte sobre el grupo focal</p>
            </div>
            <div className="m-acts">
              <button className="btn-x" onClick={() => setShowFGModal(false)} disabled={fgLoading}>Cancelar</button>
              <button className="btn-ok" disabled={fgLoading || !fgForm.name.trim() || !fgForm.email.trim()}
                style={{ background: (!fgForm.name.trim() || !fgForm.email.trim() || fgLoading) ? "#D1D5DB" : "#6366F1" }}
                onClick={handleFGRegister}>
                {fgLoading ? "Inscribiéndose..." : "Confirmar inscripción"}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

    // Debe decir solamente: function InterviewScheduler() { ... }
    
    // --------------------------------

    // 4. Esta línea final arranca la aplicación y la muestra en pantalla
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InterviewScheduler />);
  </script>
</body>
</html>
